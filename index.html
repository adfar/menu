<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Cookie
        </title>
        <link rel="stylesheet" href="styles.css">
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const cc = document.querySelector('#cc');
                const ccclasses = cc.classList;
                const mm = document.querySelector('#mm');
                const mmclasses = mm.classList;
                const sd = document.querySelector('#sd');
                const sdclasses = sd.classList;
                const pb = document.querySelector('#pb');
                const pbclasses = pb.classList;
                document.querySelector('#ccb').onclick = function() {
                    const result = ccclasses.toggle("out")
                    if (result) {
                        document.querySelector('#ccp').innerHTML = 'Sold Out';
                    }
                    else {
                        document.querySelector('#ccp').innerHTML = '$3.34';
                    }
                }
                document.querySelector('#mmb').onclick = function() {
                    const result = mmclasses.toggle("out")
                    if (result) {
                        document.querySelector('#mmp').innerHTML = 'Sold Out';
                    }
                    else {
                        document.querySelector('#mmp').innerHTML = '$3.34';
                    }
                }
                document.querySelector('#sdb').onclick = function() {
                    const result = sdclasses.toggle("out")
                    if (result) {
                        document.querySelector('#sdp').innerHTML = 'Sold Out';
                    }
                    else {
                        document.querySelector('#sdp').innerHTML = '$3.34';
                    }
                }
                document.querySelector('#pbb').onclick = function() {
                    const result = pbclasses.toggle("out")
                    if (result) {
                        document.querySelector('#pbp').innerHTML = 'Sold Out';
                    }
                    else {
                        document.querySelector('#pbp').innerHTML = '$3.34';
                    }
                }
            }
            )
        </script>
    </head>
    <body>
        <h1>Cookies</h1>
        <ul>
            <li id="cc"><span class='cookie'>Chocolate Chip</span><span class='price' id="ccp">$3.34</span><span><button id="ccb">Out</button></span></li>
            <li id="mm"><span class='cookie'>M&M</span><span class='price' id="mmp">$3.34</span><span><button id="mmb">Out</button></span></li>
            <li id="sd"><span class='cookie'>Snickerdoodle</span><span class='price' id="sdp">$3.34</span><span><button id="sdb">Out</button></span></li>
            <li id="pb"><span class='cookie'>Peanut Butter</span><span class='price' id="pbp">$3.34</span><span><button id="pbb">Out</button></span></li>
        </ul>
    </body>
</html>
